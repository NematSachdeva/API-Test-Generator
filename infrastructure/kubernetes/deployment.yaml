apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-test-generator
  labels:
    app: api-test-generator
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-test-generator
  template:
    metadata:
      labels:
        app: api-test-generator
        version: v1
    spec:
      containers:
      - name: api-test-generator
        image: api-test-generator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: FLASK_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: HOST
          value: "0.0.0.0"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
