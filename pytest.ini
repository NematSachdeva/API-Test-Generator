[pytest]
# Pytest configuration for API Test Generator

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    selenium: Selenium UI tests (skipped in CI)
    slow: Slow running tests

# Minimum Python version
minversion = 3.11
