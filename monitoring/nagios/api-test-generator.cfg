# Nagios Configuration for API Test Generator

define host {
    use                     linux-server
    host_name               api-test-generator
    alias                   API Test Generator Service
    address                 localhost
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               api-test-generator
    service_description     HTTP Health Check
    check_command           check_http!-p 8080 -u /health
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    notification_interval   30
}

define service {
    use                     generic-service
    host_name               api-test-generator
    service_description     API Response Time
    check_command           check_http!-p 8080 -u /health -w 2 -c 5
    max_check_attempts      3
    check_interval          5
}

define service {
    use                     generic-service
    host_name               api-test-generator
    service_description     Container Status
    check_command           check_docker_container!api-test-generator
    max_check_attempts      3
    check_interval          5
}
