openapi: "3.0.0"

info:
  title: Ecommerce API
  description: Simple ecommerce service for products and orders
  version: "1.0.0"

servers:
  - url: http://localhost:4000

paths:
  /products:
    get:
      summary: Get all products
      responses:
        "200":
          description: Successful response

    post:
      summary: Create a new product
      responses:
        "201":
          description: Product created

  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details

    put:
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product updated

    delete:
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Product deleted

  /orders:
    get:
      summary: Get all orders
      responses:
        "200":
          description: Orders list